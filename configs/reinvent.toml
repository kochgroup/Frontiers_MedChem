run_type = "staged_learning"
device = "cpu"
tb_logdir ="tb_logs"
json_out_config = "_staged_learning.json"


[parameters]
summary_csv_prefix = "/nfs/home/myuecel3/Frontiers_MedChem/data/output/reinvent_maize_gold"
use_checkpoint = false
purge_memories = false
prior_file = "/nfs/home/myuecel3/Frontiers_MedChem/priors/reinvent.prior"
agent_file = "/nfs/home/myuecel3/Frontiers_MedChem/priors/reinvent.prior"

batch_size = 64
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[[stage]]
chkpt_file = "/nfs/home/myuecel3/Frontiers_MedChem/data/output/reinvent_maize_gold_stage1.chkpt"
termination = "simple"
max_score = 1
min_steps = 5
max_steps = 10


[stage.scoring]

type = "geometric_mean"
[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Unwanted SMARTS"
weight = 1
params.smarts = [
    "[*;r8]",
    "[*;r9]",
    "[*;r10]",
    "[*;r11]",
    "[*;r12]",
    "[*;r13]",
    "[*;r14]",
    "[*;r15]",
    "[*;r16]",
    "[*;r17]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]",
    "[#7;!n][S;!$(S(=O)=O)]",
    "[#7;!n][#7;!n]",
    "C#C",
    "C(=[O,S])[O,S]",
    "[#7;!n][C;!$(C(=[O,N])[N,O])][#16;!s]",
    "[#7;!n][C;!$(C(=[O,N])[N,O])][#7;!n]",
    "[#7;!n][C;!$(C(=[O,N])[N,O])][#8;!o]",
    "[#8;!o][C;!$(C(=[O,N])[N,O])][#16;!s]",
    "[#8;!o][C;!$(C(=[O,N])[N,O])][#8;!o]",
    "[#16;!s][C;!$(C(=[O,N])[N,O])][#16;!s]"
]

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]

[[stage.scoring.component.ExternalProcess.endpoint]]
params.executable = "/nfs/home/myuecel3/creativity_project/.venv/bin/python"
params.args = "/nfs/home/myuecel3/creativity_project/malte_obj.py"
name="scores"
params.property = "predictions"
weight=1
